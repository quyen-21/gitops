apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: web
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/quyen-21/gitops.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true